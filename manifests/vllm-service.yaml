# Service of type LoadBalancer.
# The Linode Cloud Controller Manager provisions a NodeBalancer when this Service is created.
# The Cloud Firewall (provisioned by Terraform) is attached after apply via:
#   kubectl -n llm annotate svc vllm \
#     service.beta.kubernetes.io/linode-loadbalancer-firewall-id=<id> --overwrite
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: llm
  labels:
    app: vllm
spec:
  type: LoadBalancer
  selector:
    app: vllm
  ports:
    - name: http
      port: 80
      targetPort: 8000
