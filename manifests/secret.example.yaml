# EXAMPLE ONLY — do not commit a real secret.yaml.
#
# `make secrets` creates this Secret automatically with a random VLLM_API_KEY.
# This file documents the shape so you know what's expected if you create it manually.
#
# Manual creation:
#   kubectl -n llm create secret generic vllm-secrets \
#     --from-literal=VLLM_API_KEY=$(openssl rand -hex 32) \
#     --from-literal=HUGGING_FACE_HUB_TOKEN=hf_xxx   # only needed for gated models
apiVersion: v1
kind: Secret
metadata:
  name: vllm-secrets
  namespace: llm
type: Opaque
stringData:
  VLLM_API_KEY: "REPLACE_WITH_RANDOM_TOKEN"
  HUGGING_FACE_HUB_TOKEN: ""  # leave empty unless you're using a gated model
